syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.validateServiceGrpc.grpc";
option java_outer_classname = "ValidateServiceProto";

service ValidateValues {
  rpc ValidateValuesAccommodation(ValidateValuesRequest) returns (ValidateValuesResponse);
}

message ValidateValuesRequest{
  string country = 1;
  string city = 2;
}

message ValidateValuesResponse{
  bool validate = 1;
  string message = 2;
}