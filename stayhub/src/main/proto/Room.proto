syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.roomServiceGrpc.grpc";
option java_outer_classname = "RoomServiceProto";

service RoomService {
  rpc getInfoRoom(RoomRequest) returns (RoomResponse);
}

message RoomRequest {
  string uuidRoom = 1;
}

enum ReservationType {
  Unspecified = 0;
  Single = 1;
  Double = 2;
  Suite = 3;
  Studio = 4;
}

message RoomResponse {
  string uuidRoom = 1;
  double price = 2;
  string uuidOwner = 3;
  ReservationType type = 4;
  string uuidAccommodation = 5;
  string nameAccommodation = 6;
}