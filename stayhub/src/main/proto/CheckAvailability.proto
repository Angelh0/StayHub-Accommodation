syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.checkAvailability.grpc";
option java_outer_classname = "AvailabilityProto";

service availabilityService {
  rpc CheckAvailability(AvailabilityRequest) returns (AvailabilityResponse);
}

message AvailabilityRequest {
  repeated string roomUuid = 1;
  string checkIn = 2;
  string checkOut = 3;
}

message RoomAvailability {
  string roomUuid = 1;
  bool available = 2;
}

message AvailabilityResponse {
  repeated RoomAvailability rooms = 1;
}

// Este contrato se utiliza para el metodo deleteRoom (como comprobacion de existencia de reservas antes de borrado)

service ReservationCheckService {
  rpc CheckFutureReservation(ReservationRequest) returns (ReservationResponse);
}

message ReservationRequest {
  string roomUuid = 1;
}

message ReservationResponse {
  string roomUuid = 1;
  bool available = 2;
}